name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch: # lets you trigger a build manually from the GitHub UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Windows exe
        run: npm run dist:win

      - name: Upload installer + portable exe
        uses: actions/upload-artifact@v4
        with:
          name: Slacker-Windows
          path: dist/*.exe
          retention-days: 90
